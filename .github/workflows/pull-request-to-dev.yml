name: Pull Request To Dev
run-name: Run Integration Tests
on:
  pull_request:
    branches:
      - 'dev'
jobs:
  integration_testing:
    runs-on: self-hosted
    container: python:3.12.3-slim
    services:
      db:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: 123
        options: >-
          --health-cmd "mysqladmin ping -p123"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Install requirements
        run: pip install --default-timeout=100 --retries=10 -r requirements.txt
      
      - name: Install curl
        run: apt-get -y update; apt-get -y install curl
      
      - name: Run app
        run: |
          python3 ./src/app/app.py &
          sleep 10
          curl -s http://localhost:5000/ > /dev/null || (cat flask.log && exit 1)
      
      - name: Set variable a to 123
        run: curl -X POST -F 'value=123' http://localhost:5000/var/a
      
      - name: Test getting the value of a variable
        run: |
          VALUE=$(curl -s http://localhost:5000/var/a)
          if [ "$VALUE" != "123" ]; then
            echo "Test FAILED: expected 123, got $VALUE"
            exit 1
          else
            echo "Integration Test PASS"
          fi
      
      - name: Clean the workspace
        if: ${{ always() }}
        run: find $GITHUB_WORKSPACE -mindepth 1 -delete
